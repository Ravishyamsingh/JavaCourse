# CodeRabbit Configuration
# https://docs.coderabbit.ai/guides/review-configuration

# Reviews configuration
reviews:
  # Enable/disable reviews
  enabled: true
  
  # Path-based configuration - be more selective to include more source files
  path_filters:
    - "!node_modules/**"
    - "!dist/**"
    - "!build/**"
    - "!coverage/**"
    - "!.next/**"
    - "!.nuxt/**"
    - "!.cache/**"
    - "!*.log"
    - "!package-lock.json"
    - "!pnpm-lock.yaml" 
    - "!yarn.lock"
    
  # Include more file types for comprehensive review
  language_filters:
    javascript: true
    typescript: true
    json: true
    markdown: true
    yaml: true
    html: true
    css: true
    scss: true
    jsx: true
    tsx: true
    mjs: true
    cjs: true
  
  # Increase limits for larger codebase
  max_files_per_review: 100
  max_lines_per_file: 2000
  
  # Enable specific review types
  review_types:
    security: true
    performance: true
    bugs: true
    style: true
    documentation: true

# Chat configuration
chat:
  enabled: true
  auto_reply: false

# Summary configuration
summary:
  enabled: true
  include_walkthrough: true
  include_poem: false

# Auto-review configuration
auto_review:
  enabled: true
  # Only for non-draft PRs
  drafts: false